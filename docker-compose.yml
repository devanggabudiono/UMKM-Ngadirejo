# =============================================
# UMKM Ngadirejo — Docker Compose
# PostgreSQL 16 development database
# =============================================
# Usage:
#   docker compose up -d        # Start PostgreSQL
#   docker compose down         # Stop PostgreSQL
#   docker compose logs -f db   # View logs
#
# After starting:
#   npx prisma db push          # Apply schema
#   npx prisma db seed          # Seed data
#   npx prisma studio           # Open database GUI
# =============================================

services:
  db:
    image: postgres:16-alpine
    container_name: umkm-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: umkm_ngadirejo
      POSTGRES_USER: umkm_app
      POSTGRES_PASSWORD: Umkm_Ng4d1r3j0_2026
    volumes:
      - umkm_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umkm_app -d umkm_ngadirejo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  umkm_pg_data:
    driver: local
